- hosts: web
  become: true
  serial: 1
  tasks:
    - name: Ensure Docker is installed
      package:
        name: docker
        state: present

    - name: Ensure Docker service is enabled and running
      service:
        name: docker
        state: started
        enabled: true

    - name: Ensure Python 3 is present
      package:
        name: python3
        state: present

    - name: Ensure deployment directory exists
      file:
        path: /opt/pet-adoption
        state: directory
        mode: "0755"
